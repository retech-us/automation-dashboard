name: Update Dashboard

on:
  push:
    branches: [master]
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [run-summary-updated]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live run summaries from all repos
        run: |
          python3 scripts/fetch-summaries.py data
          python3 scripts/generate-bootstrap.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          keep_files: false
          exclude_assets: '.github'
