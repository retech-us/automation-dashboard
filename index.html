<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Store Intell QA — Automation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/dashboard.v10.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <div>
        <p class="eyebrow">Store Intell QA <span class="version-tag">v10</span></p>
        <h1>Automation Dashboard</h1>
        <p class="subtitle">Green = passed · Amber = mostly passed · Red = failures</p>
      </div>
      <div class="header__meta">
        <span id="last-updated" class="meta-pill">Loading…</span>
        <button id="refresh-btn" class="btn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="overall-banner" class="overall-banner" aria-live="polite"></section>
    <section class="cards" id="repo-cards" aria-label="Automation repositories"></section>

    <section class="panel" id="failures-panel" hidden>
      <div class="panel__header">
        <h2>Recent Failures</h2>
        <p>Human-readable reasons from the latest runs</p>
      </div>
      <div id="failures-list" class="failures-list"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Store Intell QA · <a href="https://retech-us.github.io/automation-dashboard/" style="color:#93c5fd">automation-dashboard</a></p>
  </footer>

  <script src="assets/bootstrap.js"></script>
  <script src="assets/js/app.v10.js"></script>
</body>
</html>
